<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>申請帳號</title>

<style>

body{
    background:#f2f2f2;
    font-family:"Microsoft JhengHei";
}

.container{

    max-width:500px;
    margin:20px auto;
    background:white;

    padding:30px;

    border-radius:10px;

    box-shadow:0 2px 10px rgba(0,0,0,.15);

}

h1{
    text-align:center;
    margin-bottom:30px;
}

.group-row{

    display:flex;
    justify-content:space-between;

    margin:20px 0;

}

.group-row label{
    font-size:18px;
}

.input-group{

    margin-top:20px;

}

.input-group label{

    display:block;

    margin-bottom:8px;

    font-size:18px;

}

input,
select{

    width:100%;

    box-sizing:border-box;

    padding:14px;

    border:1px solid #ccc;

    border-radius:6px;

    font-size:16px;

}

.hint{

    margin-top:8px;

    color:#777;

    font-size:14px;

}

button{

    width:100%;

    margin-top:30px;

    background:#4b8fe2;

    color:white;

    border:none;

    padding:16px;

    font-size:24px;

    border-radius:6px;

    cursor:pointer;

}

.bottom-link{

    margin-top:25px;

    text-align:right;

}

.bottom-link a{

    color:#0066ff;

    text-decoration:none;

}

</style>

</head>

<body>

<div class="container">

<h1>申請帳號</h1>

<div>

<label><strong>組別：</strong></label>

<div class="group-row">

<label>
<input
type="radio"
name="group"
value="1"
onchange="loadTemple(1)">
第1組
</label>

<label>
<input
type="radio"
name="group"
value="2"
onchange="loadTemple(2)">
第2組
</label>

<label>
<input
type="radio"
name="group"
value="3"
onchange="loadTemple(3)">
第3組
</label>

</div>

</div>

<div class="input-group">

<label>壇名：</label>

<select id="temple">

<option>
請先圈選組別...
</option>

</select>

</div>

<div class="input-group">

<label>姓名：</label>

<input
id="name"
type="text"
placeholder="請輸入真實姓名">

</div>

<div class="input-group">

<label>帳號：</label>

<input
id="account"
type="email"
placeholder="例如：example@gmail.com">

</div>

<div class="input-group">

<label>密碼：</label>

<input
id="password"
type="text"
placeholder="例如：912345678">

<div class="hint">
請輸入手機號碼，開頭不含0
</div>

</div>

<button onclick="registerAccount()">
送出申請
</button>

<div class="bottom-link">

<a href="index.html">
返回登入
</a>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
