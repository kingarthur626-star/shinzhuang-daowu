  <style>

    .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
    input, select { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background-color: #4CAF50; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; margin-top: 10px; }
    button:hover { background-color: #45a049; }
    .link-btn { background: none; color: #0066cc; border: none; cursor: pointer; text-decoration: underline; padding: 0; margin-top: 15px; font-size: 14px; }
    .hidden { display: none; }
    .radio-group { text-align: left; margin: 10px 0; padding-left: 5%; font-size: 15px; }
    .radio-group label { margin-right: 10px; cursor: pointer; }
  </style>

  <div class="container" id="loginBlock">
    <h2>系統登入</h2>
    <input type="text" id="loginTanName" placeholder="請輸入壇名">
    <input type="password" id="loginPassword" placeholder="請輸入密碼 (手機號碼)">
    <button onclick="login()">登入</button>
    <button class="link-btn" onclick="toggleForm('applyBlock')">還沒有帳號？點此申請</button>
  </div>

  <div class="container hidden" id="applyBlock">

    <div class="radio-group">
      <label><input type="radio" name="group" value="第1組" checked> 第1組</label>

      <label><input type="radio" name="group" value="第3組"> 第3組</label>
    </div>
    <input type="text" id="applyTanName" placeholder="壇名" required>
    <input type="text" id="applyName" placeholder="真實姓名" required>
    <input type="email" id="applyAccount" placeholder="Email 帳號 (選填)">
    <input type="text" id="applyPassword" placeholder="手機號碼 (將作為登入密碼)" required>
    <button onclick="sendApp()" id="submitBtn">送出申請</button>
    <button class="link-btn" onclick="toggleForm('loginBlock')">返回登入</button>
  </div>
