<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>新莊區 道務檢視</title>

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div class="page">
    <div class="card">
      <h1>新莊區 道務檢視</h1>

      <div id="loginMessage" class="message"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="loginAccount">登入帳號</label>
          <input id="loginAccount" type="email" placeholder="請輸入帳號" autocomplete="username" />
        </div>

        <div class="form-group">
          <label for="loginPassword">登入密碼</label>
          <input id="loginPassword" type="password" placeholder="請輸入密碼" autocomplete="current-password" />
        </div>

        <button class="btn" id="loginBtn" type="submit">登入</button>
      </form>

      <div class="login-link-row">
        <a class="text-link" href="register.html">申請帳號</a>
        <a class="text-link" href="forgot.html">忘記密碼</a>
      </div>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/common.js"></script>
  <script src="js/login.js"></script>
</body>
</html>
