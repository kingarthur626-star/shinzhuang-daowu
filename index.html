<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>新莊區 道務檢視</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    background:#f2f2f2;
    font-family:"Microsoft JhengHei";
}

.login-container{
    max-width:450px;
    margin:100px auto;
    background:#fff;
    padding:35px;
    border-radius:10px;
    box-shadow:0 2px 10px rgba(0,0,0,.15);
}

.title{
    text-align:center;
    font-size:32px;
    font-weight:bold;
    margin-bottom:30px;
}

label{
    display:block;
    margin-bottom:8px;
    font-size:18px;
}

input{
    width:100%;
    box-sizing:border-box;
    padding:14px;
    border:1px solid #ccc;
    border-radius:6px;
    margin-bottom:20px;
    font-size:16px;
}

button{
    width:100%;
    background:#4b8fe2;
    color:#fff;
    border:none;
    padding:15px;
    font-size:22px;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#3579d1;
}

.bottom-link{
    text-align:right;
    margin-top:20px;
}

.bottom-link a{
    color:#0066ff;
    text-decoration:none;
    font-size:16px;
}

</style>

</head>
<body>

<div class="login-container">

    <div class="title">
        新莊區 道務檢視
    </div>

    <label>登入帳號：</label>
    <input
        id="loginAccount"
        type="email"
        placeholder="請輸入帳號">

    <label>登入密碼：</label>
    <input
        id="loginPassword"
        type="password"
        placeholder="請輸入密碼">

    <button onclick="login()">
        登入
    </button>

    <div class="bottom-link">
        <a href="register.html">
            申請帳號
        </a>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>
