<!DOCTYPE html>
<html lang="zh-Hant">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>新莊區 道務檢視</title>

<style>

body{

    background:#f2f2f2;
    font-family:"Microsoft JhengHei";

}

.container{

    max-width:800px;

    margin:40px auto;

    background:white;

    padding:40px;

    border-radius:10px;

    box-shadow:0 2px 10px rgba(0,0,0,.15);

}

.title{

    font-size:32px;

    font-weight:bold;

    margin-bottom:30px;

    text-align:center;

}

.info{

    font-size:22px;

    line-height:2;

}

.logout{

    margin-top:30px;

    text-align:right;

}

button{

    background:#dc3545;

    color:white;

    border:none;

    padding:12px 24px;

    border-radius:6px;

    cursor:pointer;

    font-size:18px;

}

</style>

</head>

<body>

<div class="container">

<div class="title">

新莊區 道務檢視

</div>

<div class="info">

<div>
壇名：
<span id="temple"></span>
</div>

<div>
姓名：
<span id="name"></span>
</div>

<div>
登入時間：
<span id="loginTime"></span>
</div>

</div>

<div class="logout">

<button onclick="logout()">

登出

</button>

</div>

</div>

<script>

document.getElementById("temple").innerText=
localStorage.getItem("temple") || "";

document.getElementById("name").innerText=
localStorage.getItem("name") || "";

document.getElementById("loginTime").innerText=
localStorage.getItem("loginTime") || "";

function logout(){

localStorage.clear();

location.href="index.html";

}

</script>

</body>
</html>
